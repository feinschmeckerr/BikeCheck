// ─── FIT CHECK ────────────────────────────────────────────────────────────────
function fitCheck(b,inkl_pm){
const T=total(b,inkl_pm);
const items=[
{k:“Carbon-Rahmen”,  v:b.carbon?1:0,    ok:b.carbon?“✅”:“❌”, note:b.carbon?””:“Alu — Anforderung fehlt”},
{k:“Geometrie OK”,   v:b.sr>=1.40&&b.st>=540?1:0.5, ok:b.sr>=1.40&&b.st>=540?“✅”:“⚠️”, note:b.sr<1.40?“S/R unter 1.40 = sehr aggressiv”:b.st<540?“Stack unter 540mm”:“S/R “+b.sr.toFixed(2)+” · Stack “+b.st+“mm”},
{k:“Kurbel 172,5mm”, v:b.km>=172.5?1:0.5, ok:b.km>=172.5?“✅”:“⚠️”, note:b.km<172.5?“170mm → Sattel +2,5mm korrigieren”:“172,5mm = BFF-Referenz”},
{k:“Reifen ≥30mm”,   v:b.rm>=35?1:b.rm>=30?0.75:b.rm>=28?0.5:0, ok:b.rm>=35?“✅”:b.rm>=30?“✅”:b.rm>=28?“⚠️”:“❌”, note:`max ${b.rm}mm${b.rm<30?" = wenig Spielraum":""}${b.rm>=35?" = Schotter möglich":""}` },
{k:“Probefahrt”,     v:b.probe?1:0, ok:b.probe?“✅”:“❌”, note:b.probe?“Händler verfügbar”:“Online-Kauf ohne Test”},
{k:“Budget ≤3.200€”, v:T<=3000?1:T<=3500?0.5:0, ok:T<=3000?“✅”:T<=3500?“⚠️”:“❌”, note:`Gesamtkosten: ${T.toLocaleString("de-DE")}€`},
{k:“Cockpit-Typ”,   v:b.cockInt?1:0.5, ok:b.cockInt?“✅”:”—”, note:b.cockInt?“Integriert = aerodynamisch, saubere Optik”:“Standard = flexibler bei Fit-Anpassungen”},
];
const score=items.reduce((s,i)=>s+i.v,0);
const pct=Math.round(score/items.length*100);
return {items,score,pct,max:items.length};
}

function radarPt(b,ax){
if(ax===“P/L”) return b.bew*10;
if(ax===“Komponenten”) return Math.round((t2n(b.lrT)+t2n(b.reT))/2);
if(ax===“Aero”) return Math.min(100,Math.round(b.fh*1.9));
if(ax===“Vielseit.”) return Math.min(100,Math.round((b.rm-28)*8+40));
if(ax===“Komfort”) return Math.round((b.sr-1.35)/0.25*100);
if(ax===“Händler”) return b.probe?100:15;
return 0;
}

function matchScore(bike, cfg) {
let score = 0;
// Rahmen
const rTier = {alu:0,c_std:1,c_pre:2,c_aero:3}[cfg.rahmen]||1;
const bTier = bike.carbon ? (bike.col===”#6366f1”||bike.col===”#ec4899”||bike.col===”#d97706”&&bike.rg===1050 ? 3 : 1) : 0;
score += Math.max(0, 3 - Math.abs(rTier - bTier)) * 10;
// Schaltung
if(cfg.schaltung===bike.sK) score += 25;
else if((cfg.schaltung===“di2”||cfg.schaltung===“ultegra”)&&(bike.sK===“di2”||bike.sK===“ultegra”)) score += 10;
// Laufrad
const lrMap={D:0,C:1,B:2,A:3,S30:4,S50:5};
const bikeLr={D:0,C:1,B:2,A:3,S:4}[bike.lrT]||2;
const cfgLr=lrMap[cfg.laufrad]||2;
score += Math.max(0, 5 - Math.abs(cfgLr - bikeLr)) * 6;
// Reifen
const rTierMap={D:0,C:1,B:2,A:3,S:4};
score += Math.max(0, 4 - Math.abs((rTierMap[cfg.reifen]||2) - (rTierMap[bike.reT]||2))) * 5;
// PM
if(cfg.pm===“ja”&&bike.pm) score += 20;
// Cockpit
if(cfg.cockpit===“int”&&bike.cockInt) score += 15;
return score;
}
